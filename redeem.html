<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aultra Paints – Service Update</title>
    <link rel="icon" href="/assets/aultrapaints_icon.png" type="image/x-icon">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            max-width: 480px;
            width: 100%;
            padding: 48px 40px 40px;
            text-align: center;
        }

        .logo {
            height: 72px;
            margin-bottom: 32px;
            object-fit: contain;
        }

        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff3cd;
            margin-bottom: 24px;
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            fill: #f0a500;
        }

        h1 {
            font-size: 1.45rem;
            color: #1a1a2e;
            margin-bottom: 16px;
            line-height: 1.35;
        }

        p {
            font-size: 1rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 28px 0;
        }

        .store-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .store-links a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .store-links a:hover { opacity: 0.85; }

        .btn-playstore { background: #01875f; color: #fff; }
        .btn-appstore  { background: #1a1a2e; color: #fff; }

        .footer-note {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">

        <img src="/assets/Aultrapaints_logo.png" alt="Aultra Paints" class="logo"
             onerror="this.style.display='none'">

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19H3.5L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
            </svg>
        </div>

        <h1>This Service Is No Longer Available</h1>

        <p>
            Web-based coupon redemption has been <strong>discontinued</strong>.<br>
            To redeem your cashback, please register yourself in the
            <span>Aultra Paints</span> mobile app and redeem from there.
        </p>

        <hr class="divider">

        <p style="font-size:0.9rem; color:#777; margin-bottom:16px;">
            Download the app to get started:
        </p>

        <div class="store-links">
            <a class="btn-playstore"
               href="https://play.google.com/store/search?q=aultra+paints+app&c=apps"
               target="_blank" rel="noopener">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M3 20.5v-17c0-.83 1-.83 1.5-.5l15 8.5-15 8.5C3.5 21.33 3 21.33 3 20.5z"/>
                </svg>
                Google Play
            </a>
        </div>

        <p class="footer-note">
            For support, contact us at
            <a href="mailto:info@aultrapaints.com" style="color:#7B1FA2;">info@aultrapaints.com</a>
        </p>

    </div>

</body>
</html>
